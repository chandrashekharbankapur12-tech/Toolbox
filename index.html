<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toolbox</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#131313">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2344/2344132.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-gray: #8E8E93;
            --text-light: #ffffff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        /* Prevent shaking and scrolling issues */
        html, body {
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #131313;
            background-image: 
                linear-gradient(45deg, #1d1d1d 25%, transparent 25%), 
                linear-gradient(-45deg, #1d1d1d 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #1d1d1d 75%), 
                linear-gradient(-45deg, transparent 75%, #1d1d1d 75%);
            background-size: 8px 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: var(--text-light);
            -webkit-font-smoothing: antialiased;
        }

        .wrapper {
            width: 100%;
            max-width: 340px;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            /* Stable container */
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
        }

        h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            letter-spacing: -0.6px;
            margin-top: 0;
        }

        /* Sections are stable and don't expand unexpectedly */
        .section {
            background: var(--glass);
            border-radius: 18px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            box-sizing: border-box;
        }

        .clickable-row {
            display: block;
            width: 100%;
            padding: 20px 16px;
            box-sizing: border-box;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .row-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 24px; /* Fixed height for stability */
        }

        .title-label { font-size: 15px; color: #ccc; }

        .value-text {
            font-size: 16px;
            color: var(--ios-blue);
            font-weight: 600;
            background: none;
            border: none;
            outline: none;
            -webkit-appearance: none;
            text-align: right;
            cursor: pointer;
        }

        .page-input-box {
            background: rgba(0,0,0,0.3);
            border: none;
            color: var(--ios-blue);
            text-align: right;
            font-size: 16px;
            width: 100px;
            outline: none;
            border-radius: 4px;
        }

        .main-btn {
            background-color: var(--ios-blue);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 18px;
            width: 100%;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(0,122,255,0.3);
            transition: transform 0.1s;
        }

        .main-btn:active { transform: scale(0.97); }

        #fileInput { display: none; }

        /* Smooth visibility for page selection */
        #pageRow { 
            display: none; 
            border-top: 1px solid rgba(255,255,255,0.05); 
        }

        #status { 
            margin-top: 20px; 
            color: var(--ios-gray); 
            font-size: 14px;
            height: 20px; /* Fixed height to prevent jumping */
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>Toolbox</h2>
    
    <div class="section">
        <div class="clickable-row" onclick="document.getElementById('toolSelect').focus()">
            <div class="row-content">
                <span class="title-label">Action</span>
                <select id="toolSelect" class="value-text" onchange="updateUI()">
                    <option value="jpgToPdf">JPG to PDF</option>
                    <option value="compress">Compress (50%)</option>
                    <option value="pdfToJpg">PDF to JPG</option>
                </select>
            </div>
        </div>
        
        <div id="pageRow" class="clickable-row">
            <div class="row-content">
                <span class="title-label">Pages</span>
                <input type="text" id="pageNumbers" class="page-input-box" placeholder="e.g. 1, 3">
            </div>
        </div>
    </div>

    <div class="section">
        <label for="fileInput" class="clickable-row">
            <div style="color: var(--ios-blue); font-size: 17px; font-weight: 600;">Choose Files</div>
            <div id="fileCount" style="font-size: 13px; color: var(--ios-gray); margin-top: 5px;">No files selected</div>
        </label>
        <input type="file" id="fileInput" multiple onchange="updateCount()">
    </div>

    <button class="main-btn" onclick="start()">Start Process</button>
    <div id="status">Ready</div>
</div>

<script>
    // --- PWA LOGIC (Install Button Hataya, par Install functionality on hai) ---
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    // --- TOOL LOGIC ---
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    function updateUI() {
        const isPdfToJpg = document.getElementById('toolSelect').value === 'pdfToJpg';
        document.getElementById('pageRow').style.display = isPdfToJpg ? 'block' : 'none';
    }

    function updateCount() {
        const files = document.getElementById('fileInput').files;
        document.getElementById('fileCount').innerText = files.length > 0 ? `${files.length} file(s) selected` : "No files selected";
    }

    async function start() {
        const fileList = document.getElementById('fileInput').files;
        const tool = document.getElementById('toolSelect').value;
        const status = document.getElementById('status');
        if (fileList.length === 0) return alert("Select files!");

        status.innerText = "Processing...";
        try {
            if (tool === 'jpgToPdf') await jpgToPdf(fileList);
            else if (tool === 'compress') await compress(fileList[0]);
            else if (tool === 'pdfToJpg') await pdfToJpg(fileList[0]);
            status.innerText = "Done!";
        } catch (err) { status.innerText = "Error!"; console.error(err); }
    }

    // PDF core functions (Stayed Same)
    async function jpgToPdf(fileList) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const files = Array.from(fileList);
        for (let i = 0; i < files.length; i++) {
            const data = await readFile(files[i]);
            if (i > 0) doc.addPage();
            const props = doc.getImageProperties(data);
            const w = doc.internal.pageSize.getWidth();
            doc.addImage(data, 'JPEG', 0, 0, w, (props.height * w) / props.width);
        }
        doc.save("merged.pdf");
    }

    async function compress(file) {
        const { PDFDocument } = PDFLib;
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
        const outPdf = await PDFDocument.create();
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const vp = page.getViewport({ scale: 2 });
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.height = vp.height; canvas.width = vp.width;
            await page.render({ canvasContext: ctx, viewport: vp }).promise;
            const img = await outPdf.embedJpg(canvas.toDataURL('image/jpeg', 0.7));
            const newPage = outPdf.addPage([img.width/2, img.height/2]);
            newPage.drawImage(img, { x: 0, y: 0, width: img.width/2, height: img.height/2 });
        }
        const bytes = await outPdf.save();
        const blob = new Blob([bytes], { type: "application/pdf" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob); a.download = "compressed.pdf"; a.click();
    }

    async function pdfToJpg(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        const input = document.getElementById('pageNumbers').value;
        let selected = input.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n) && n > 0 && n <= pdf.numPages);
        if (selected.length === 0) selected = Array.from({length: pdf.numPages}, (_, i) => i + 1);

        for (const num of selected) {
            const page = await pdf.getPage(num);
            const vp = page.getViewport({ scale: 2 });
            const canvas = document.createElement('canvas');
            canvas.height = vp.height; canvas.width = vp.width;
            await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
            const a = document.createElement('a');
            a.href = canvas.toDataURL('image/jpeg', 0.9); a.download = `page_${num}.jpg`; a.click();
            await new Promise(r => setTimeout(r, 500));
        }
    }

    function readFile(file) { return new Promise((r) => { const reader = new FileReader(); reader.onload = (e) => r(e.target.result); reader.readAsDataURL(file); }); }
</script>
</body>
</html>
